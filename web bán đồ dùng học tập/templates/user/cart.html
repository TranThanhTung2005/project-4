{% extends "base.html" %}

{% block content %}
<main class="cart-page-wrapper">
    <section class="cart-hero">
        <div>
            <p class="eyebrow">Giỏ hàng</p>
            <h1 class="cart-title">Hoàn tất lựa chọn cho buổi học tiếp theo</h1>
            <p class="hero-text">Kiểm tra lại sản phẩm, số lượng và tổng tiền trước khi xác nhận đơn hàng.</p>
        </div>
        <a href="/" class="secondary-link">Tiếp tục mua sắm</a>
    </section>

    <div class="cart-layout">
        <section id="cart-content-area" class="white-box cart-items-panel"></section>

        <aside id="cart-summary-area" class="white-box cart-summary-panel">
            <div id="cart-total-price"></div>
            <button class="btn-checkout-final" onclick="checkout()">Xác nhận thanh toán</button>
        </aside>
    </div>
</main>

<script>
    window.onload = () => { renderCartPage(); };
</script>
{% endblock %}
